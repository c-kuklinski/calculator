on:
  push:
  workflow_dispatch:
    inputs:
      RUN_TESTS:
        description: run tests
        type: boolean
        default: false
        required: false
        
env:
  RUN_TESTS: ${{ github.event.inputs.RUN_TESTS || vars.RUN_TESTS || 'true' }}

jobs:
  cd:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v6

      - name: init
        run: |
          echo 'step init'
          pwd && ls
          env
          echo ${{ secrets.DOCKERHUB_TOKEN }}
          echo ${{ env.RUN_TESTS }}
          java -version
          mvn -v
          docker version
          
      - name: build
        run: |
          echo 'run tests'
          mvn clean package -DskipTests
          
      - if: env.RUN_TESTS == 'true'
        name: test
        run: |
          echo 'step test'
          mvn test -P run-integration-tests
      - if: env.RUN_TESTS == 'true'
        uses: dorny/test-reporter@v3
        with:
          name: JUnit Tests Report
          reporter: java-junit
          path: target/surefire-reports/*.xml
          fail-on-error: false

      - if: env.RUN_TESTS == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: JaCoCo Coverage Report
          path: target/site/jacoco/
        
      - name: release
        run: |
          echo 'step release'
          docker build -t ghcr.io/${{ github.repository }} --no-cache .
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository }}

      - uses: Azure/k8s-set-context@v5
        with:
           kubeconfig: ${{ secrets.KUBECONFIG_FILE }}
           context: kubernetes-admin@kubernetes
           
      - name: deploy
        uses: Azure/k8s-deploy@v5
        with: 
          manifests: calculator-cd.yaml
          annotate-resources: false

          

    
    
