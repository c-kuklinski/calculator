on:
  push:
  workflow_dispatch:
env:
  RUN_TESTS: 'true'

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.14
    
      - name: init
        run: |
          echo 'step init'
          pwd && ls
          env
          echo ${{ secrets.DOCKERHUB_TOKEN }}
          echo ${{ env.RUN_TESTS }}
          java -version
          mvn -v
          docker version
          
      - name: build
        run: |
          echo 'run tests'
          mvn clean package -DskipTests
          
      - if: env.RUN_TESTS == 'true'
        name: test
        run: |
          echo 'step test'
          mvn test -P run-integration-tests
          
      - name: release
        run: |
          echo 'step release'
          docker build -t lion78at/calculator --no-cache .
          echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u lion78at --password-stdin
          docker push lion78at/calculator
        
      - name: deploy
        run: echo 'step deploy'

    
    
