on:
  push:
  workflow_dispatch:
jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.14
    
      - name: init
        run: |
          echo 'step init'
          pwd && ls
          env
          echo ${{ secrets.DOCKERHUB_TOKEN }}
          echo ${{ env.run_TESTS }}
          java -version
          mvn -v
          docker version
          
      - name: build
        run: echo 'step build'
  
          
      - name: test
        run: echo 'step test'
    
          
      - name: release
        run: echo 'step release'
        
      - name: deploy
        run: echo 'step deploy'

    
    
